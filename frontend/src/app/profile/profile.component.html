<a routerLink="/profile" class="d-flex align-items-center gap-2 text-decoration-none">
  <img [src]="authService.getAvatarUrl()"
       [alt]="authService.getName()"
       style="width:34px; height:34px; border-radius:50%; border:2px solid rgba(244,185,66,.4); object-fit:cover;"/>
  <span style="font-size:14px; color:#94a3b8; font-weight:500;">{{ authService.getName() }}</span>
</a>
