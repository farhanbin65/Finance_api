<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card border-0 shadow-lg auth-card">
    <div class="card-body p-5">

      <!-- Logo -->
      <div class="text-center mb-4">
        <h2>💰 Finance Tracker</h2>
        <p class="text-muted">Sign in to your account</p>
      </div>

      <!-- Error -->
      @if (errorMessage) {
        <div class="alert alert-danger py-2">{{ errorMessage }}</div>
      }

      <!-- Form -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input
            type="text"
            class="form-control"
            [(ngModel)]="email"
            placeholder="username"
        />
        </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          placeholder="password"
          (keyup.enter)="onLogin()"
        />
      </div>

      <button
        class="btn btn-dark w-100 mb-3"
        (click)="onLogin()"
        [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1">
        <span class="px-2 text-muted small">or</span>
        <hr class="flex-grow-1">
      </div>

      <button
        class="btn btn-outline-secondary w-100 mb-3 d-flex align-items-center justify-content-center gap-2"
        (click)="loginWithGoogle()"
        [disabled]="isLoading">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <p class="text-center text-muted mb-0">
        Don't have an account?
        <a routerLink="/register" class="text-decoration-none fw-semibold">Register</a>
      </p>

    </div>
  </div>
</div>
