<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="card border-0 shadow-lg auth-card">
    <div class="card-body p-5">

      <!-- Logo -->
      <div class="text-center mb-4">
        <h2>💰 Finance Tracker</h2>
        <p class="text-muted">Create your account</p>
      </div>

      <!-- Messages -->
      @if (errorMessage) {
        <div class="alert alert-danger py-2">{{ errorMessage }}</div>
      }
      @if (successMessage) {
        <div class="alert alert-success py-2">{{ successMessage }}</div>
      }

      <!-- Form -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="name"
          placeholder="John Smith"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          placeholder="you@example.com"
        />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          placeholder="Min. 6 characters"
        />
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="confirmPassword"
          placeholder="••••••••"
          (keyup.enter)="onRegister()"
        />
      </div>

      <button
        class="btn btn-dark w-100 mb-3"
        (click)="onRegister()"
        [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>

      <p class="text-center text-muted mb-0">
        Already have an account?
        <a routerLink="/login" class="text-decoration-none fw-semibold">Sign In</a>
      </p>

    </div>
  </div>
</div>
